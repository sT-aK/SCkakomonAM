<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>SC 過去問道場</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0ea5a3">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js" defer></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js" defer></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js" defer></script>
</head>
<body>
<div id="app-root">
<style>
  :root{
    --radius:18px; --radius-lg:26px; --radius-cap:999px; --blur:blur(14px) saturate(150%);
    --jp:"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic","Meiryo","Noto Sans JP",system-ui,sans-serif;
    /* リキッドグラス: 粘性のあるモーション用イージング */
    --ease-liquid:cubic-bezier(.22,1,.36,1); --ease-liquid-inout:cubic-bezier(.65,0,.35,1); --ease-press:cubic-bezier(.34,1.25,.64,1);
    --dur-fast:.3s; --dur-med:.55s; --dur-slow:.8s;
    --glass-blur:blur(22px) saturate(180%);
  }
  /* 標準のドキュメントスクロール構成（bodyがスクロール）。
     背景グラデは #app-root::before の全画面固定レイヤーで描き、穏やかにアニメさせる。
     html は同じグラデの静的フォールバック（リペイント時に一瞬露出しても色が変わって見えない）。 */
  html,body{margin:0; padding:0;}
  html{background:linear-gradient(160deg,#0ea5a3 0%,#3b82f6 55%,#8b5cf6 100%);}
  html.night{background:linear-gradient(160deg,#0b1120 0%,#1e1b4b 55%,#3b0764 100%);}
  /* 昼テーマ「オーロラ」（6〜17時） */
  #app-root{
    --bg-grad:linear-gradient(160deg,#0ea5a3 0%,#3b82f6 55%,#8b5cf6 100%);
    --card:rgba(255,255,255,.62); --card2:rgba(255,255,255,.5);
    --ink:#1c2340; --muted:#44507a; --line:rgba(255,255,255,.6);
    --primary:#1d6fb8; --primary-soft:rgba(29,111,184,.15);
    --ok:#17805a; --ok-soft:rgba(23,128,90,.16); --ok-line:rgba(23,128,90,.4);
    --ng:#c53049; --ng-soft:rgba(197,48,73,.14); --ng-line:rgba(197,48,73,.4);
    --due:#916300; --due-soft:rgba(145,99,0,.16);
    --new:#2b6cb0; --new-soft:rgba(43,108,176,.15);
    --unk:#6d5ce0; --unk-soft:rgba(109,92,224,.15);
    --btn-bg:#ffffff; --btn-ink:#1d6fb8;
    --tab-on-bg:#1d6fb8; --tab-on-ink:#fff;
    --track:rgba(255,255,255,.55);
    --hero:rgba(255,255,255,.28); --hero-line:rgba(255,255,255,.5);
    --on-grad:rgba(255,255,255,.92);
    --shadow:0 8px 24px rgba(10,50,90,.16);
    --glass-bg:rgba(255,255,255,.16); --glass-line:rgba(255,255,255,.5);
    --glass-edge:inset 0 1px 0 rgba(255,255,255,.55), inset 0 -1px 0 rgba(255,255,255,.12);
    --glass-shadow:0 12px 36px rgba(10,50,90,.22);
  }
  /* 夜テーマ「ナイトグラス」（18〜5時） */
  #app-root.night{
    --bg-grad:linear-gradient(160deg,#0b1120 0%,#1e1b4b 55%,#3b0764 100%);
    --card:rgba(255,255,255,.10); --card2:rgba(255,255,255,.08);
    --ink:#eceafb; --muted:#a9a4cd; --line:rgba(255,255,255,.18);
    --primary:#8be9fd; --primary-soft:rgba(139,233,253,.16);
    --ok:#1da368; --ok-soft:rgba(29,163,104,.2); --ok-line:rgba(29,163,104,.45);
    --ng:#ef4f66; --ng-soft:rgba(239,79,102,.18); --ng-line:rgba(239,79,102,.45);
    --due:#bd8118; --due-soft:rgba(189,129,24,.2);
    --new:#4a8ce0; --new-soft:rgba(74,140,224,.18);
    --unk:#a78bfa; --unk-soft:rgba(167,139,250,.18);
    --btn-bg:linear-gradient(135deg,#8be9fd,#a78bfa); --btn-ink:#141233;
    --tab-on-bg:#6d5ce0; --tab-on-ink:#fff;
    --track:rgba(255,255,255,.14);
    --hero:rgba(255,255,255,.12); --hero-line:rgba(255,255,255,.22);
    --on-grad:rgba(236,234,251,.8);
    --shadow:0 8px 24px rgba(0,0,0,.35);
    --glass-bg:rgba(30,26,60,.34); --glass-line:rgba(255,255,255,.22);
    --glass-edge:inset 0 1px 0 rgba(255,255,255,.28), inset 0 -1px 0 rgba(255,255,255,.06);
    --glass-shadow:0 12px 36px rgba(0,0,0,.5);
  }
  #app-root{font-family:var(--jp); color:var(--ink); -webkit-font-smoothing:antialiased; line-height:1.6; min-height:100vh; --bg-x:0; --bg-y:0; --bg-hue:0deg;}
  /* 全画面固定のグラデ層。JS(下部の自己再帰ループ)がランダムな目標値を
     --bg-x/--bg-y/--bg-hue にセットし、このtransitionで滑らかに遷移する
     ことで周期性のないゆらぎを作る（GPU合成で軽い）。scale(1.15)の
     オーバースキャンでドリフト時も端が出ない。filterは擬似要素のみに
     効き本文は着色しない。 */
  #app-root::before{content:''; position:fixed; inset:0; z-index:-1; pointer-events:none; background:var(--bg-grad); transform:scale(1.15) translate(var(--bg-x),var(--bg-y)); filter:hue-rotate(var(--bg-hue)); transform-origin:center; will-change:transform,filter; transition:transform 4s var(--ease-liquid-inout), filter 4s var(--ease-liquid-inout);}
  @media (prefers-reduced-motion:reduce){ #app-root::before{transition:none;} }
  .stat,.panel,.qcard,.scorecard,.daylist{-webkit-backdrop-filter:var(--blur); backdrop-filter:var(--blur);}
  #app-root *{box-sizing:border-box;}
  /* padding-top = 浮遊トップバー、padding-bottom = 浮遊タブバー。どちらにも隠れないように */
  .wrap{max-width:760px; margin:0 auto; padding:calc(env(safe-area-inset-top,0px) + 74px) 16px calc(88px + env(safe-area-inset-bottom));}
  /* ---- 上部：浮遊ガラスバー（ハンバーガー＋AMⅠ/AMⅡ区分トグル） ---- */
  .topbar-float{position:fixed; top:calc(env(safe-area-inset-top,0px) + 10px); left:50%; transform:translateX(-50%); z-index:60; display:flex; align-items:center; gap:10px; width:min(92vw,560px); padding-left:max(0px,calc(env(safe-area-inset-left) - 4vw)); padding-right:max(0px,calc(env(safe-area-inset-right) - 4vw));}
  .menu-btn{position:relative; flex:none; width:46px; height:46px; padding:0; border:1px solid var(--glass-line); border-radius:var(--radius-cap); background:var(--glass-bg); -webkit-backdrop-filter:var(--glass-blur); backdrop-filter:var(--glass-blur); box-shadow:var(--glass-edge), var(--glass-shadow); color:var(--ink); font-size:18px; line-height:1; cursor:pointer; -webkit-appearance:none; appearance:none; display:flex; align-items:center; justify-content:center; overflow:visible; transition:transform var(--dur-fast) var(--ease-press), background .35s var(--ease-liquid), color .35s var(--ease-liquid), border-color .35s var(--ease-liquid);}
  .menu-btn:active{transform:scale(.92);}
  .menu-btn.on{background:var(--tab-on-bg); color:var(--tab-on-ink); border-color:var(--tab-on-bg);}
  .menu-ic{font-size:18px; font-weight:700;}
  /* AMⅠ/AMⅡトグルは横幅を狭め、バー内で中央寄せ（ハンバーガーは左に固定） */
  .sec-seg{position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); width:min(60vw,240px); display:flex; gap:6px; padding:5px; border:1px solid var(--glass-line); border-radius:var(--radius-cap); background:var(--glass-bg); -webkit-backdrop-filter:var(--glass-blur); backdrop-filter:var(--glass-blur); box-shadow:var(--glass-edge), var(--glass-shadow);}
  #secGlider{position:absolute; top:5px; bottom:5px; left:0; width:0; border-radius:var(--radius-cap); background:var(--tab-on-bg); box-shadow:var(--shadow); z-index:0; pointer-events:none; transition:transform var(--dur-med) var(--ease-liquid), width var(--dur-med) var(--ease-liquid);}
  .sec-btn{position:relative; z-index:1; flex:1; text-align:center; padding:9px 4px; border-radius:var(--radius-cap); font-size:14px; font-weight:700; letter-spacing:.03em; color:var(--muted); cursor:pointer; border:none; background:transparent; font-family:inherit; transition:color var(--dur-fast) var(--ease-liquid);}
  .sec-btn[aria-selected="true"]{color:var(--tab-on-ink);}
  .persist-note{font-size:11.5px; color:var(--muted); background:var(--card2); border:1px solid var(--line); padding:4px 9px; border-radius:999px;}
  .persist-note.warn{color:var(--due); border-color:var(--due-soft); background:var(--due-soft);}
  .sync-dot{position:absolute; right:-2px; bottom:-2px; width:12px; height:12px; border-radius:50%; background:var(--muted); border:2px solid var(--glass-bg); box-shadow:0 0 0 1px var(--glass-line);}
  .sync-dot.ok{background:var(--ok);} .sync-dot.warn{background:var(--due);}
  .gicon{flex:none; width:30px; height:30px; border-radius:50%; background:#fff; color:#4285F4; border:1px solid var(--glass-line); display:flex; align-items:center; justify-content:center; font-weight:800; font-size:16px; box-shadow:var(--glass-edge);}
  /* 区分切替時のカード風スライド（左右）。再描画後に付与し animationend で外す */
  @keyframes cardInR{from{opacity:0; transform:translateX(30px) scale(.985);} to{opacity:1; transform:none;}}
  @keyframes cardInL{from{opacity:0; transform:translateX(-30px) scale(.985);} to{opacity:1; transform:none;}}
  .view.sec-in-r{animation:cardInR var(--dur-med) var(--ease-liquid) both;}
  .view.sec-in-l{animation:cardInL var(--dur-med) var(--ease-liquid) both;}
  /* タブバーは画面下端から浮いたガラスのカプセル。選択中タブは#tabGliderが
     液体的にスライドして追従する（moveGlider()）。手動オフセット/モード分岐なし。 */
  .tabs{position:fixed; left:50%; bottom:calc(12px + env(safe-area-inset-bottom)); transform:translateX(-50%); z-index:50; width:min(92vw,560px); display:flex; gap:6px; background:var(--glass-bg); -webkit-backdrop-filter:var(--glass-blur); backdrop-filter:var(--glass-blur); border:1px solid var(--glass-line); border-radius:var(--radius-cap); padding:5px; box-shadow:var(--glass-edge), var(--glass-shadow);}
  #tabGlider{position:absolute; top:5px; bottom:5px; left:0; width:0; border-radius:var(--radius-cap); background:var(--tab-on-bg); box-shadow:var(--shadow); z-index:0; pointer-events:none; transition:transform var(--dur-med) var(--ease-liquid), width var(--dur-med) var(--ease-liquid);}
  .tab{position:relative; z-index:1; flex:1; text-align:center; padding:11px 4px; border-radius:var(--radius-cap); font-size:13.5px; font-weight:600; color:var(--muted); cursor:pointer; border:none; background:transparent; font-family:inherit; transition:color var(--dur-fast) var(--ease-liquid);}
  .tab[aria-selected="true"]{color:var(--tab-on-ink);}
  .view{display:none;} .view.active{display:block;}
  /* 画面切替のスライド静定（display:none→block で毎回再生される）。粘性系でゆっくりぬるっと。
     opacityはアニメしない: フェード中に背景グラデが露出して「背景色が切り替わる」ように見えるうえ、
     opacity<1のビューはbackdrop-rootとなり内部ガラスのbackdrop-filterが背後を拾えなくなるため */
  .view.active{animation:viewIn var(--dur-med) var(--ease-liquid) both;}
  @keyframes viewIn{from{transform:translateY(16px) scale(.985);} to{transform:none;}}
  /* タップの触覚的フィードバック: 押下は速く沈み、戻りはぬるっと（極小の弾み付き） */
  .btn,.nextbtn,.dunno,.skipbtn,.seg button,.persist-note,.linkbtn{transition:transform var(--dur-fast) var(--ease-press), background .35s var(--ease-liquid), color .35s var(--ease-liquid), border-color .35s var(--ease-liquid), box-shadow .35s var(--ease-liquid), opacity .35s var(--ease-liquid), filter .35s var(--ease-liquid);}
  .startbtn:active,.nextbtn:active,.btn:active,.dunno:active{transform:translateY(1px) scale(.985); transition-duration:.15s;}
  .tab:active,.diff-btn:active,.seg button:active,.chk:active,.choice:active,.persist-note:active,.linkbtn:active{transform:scale(.95); transition-duration:.15s;}
  /* 正解の「いいね」演出 */
  .like-burst{position:absolute; left:50%; top:42%; font-size:92px; line-height:1; pointer-events:none; z-index:6; will-change:transform,opacity; animation:likePop 1.4s cubic-bezier(.3,.9,.35,1) forwards; filter:drop-shadow(0 8px 16px rgba(0,0,0,.28));}
  @keyframes likePop{
    0%{transform:translate(-50%,-50%) scale(0) rotate(-16deg); opacity:0;}
    22%{transform:translate(-50%,-52%) scale(1.18) rotate(7deg); opacity:1;}
    42%{transform:translate(-50%,-54%) scale(.94) rotate(-2deg); opacity:1;}
    60%{transform:translate(-50%,-54%) scale(1) rotate(0); opacity:1;}
    100%{transform:translate(-50%,-72%) scale(1) rotate(0); opacity:0;}
  }
  .feedback.ok,.feedback.ng{animation:fbIn var(--dur-med) var(--ease-liquid) both;}
  @keyframes fbIn{from{opacity:0; transform:translateY(10px) scale(.97);} to{opacity:1; transform:none;}}
  @media (prefers-reduced-motion:reduce){
    .view.active,.like-burst,.feedback.ok,.feedback.ng{animation:none;}
    #tabGlider{transition:none;}
    *{transition-duration:.01ms !important;}
  }
  .grid{display:grid; grid-template-columns:repeat(2,1fr); gap:12px; margin-bottom:16px;}
  .stat{background:var(--card); border:1px solid var(--line); border-radius:var(--radius-lg); padding:15px 16px; box-shadow:var(--glass-edge);}
  .stat .num{font-size:30px; font-weight:800; line-height:1.1; font-variant-numeric:tabular-nums;}
  .stat .lab{font-size:12.5px; color:var(--muted); margin-top:3px;}
  .stat.new .num{color:var(--new);} .stat.ng .num{color:var(--ng);}
  .stat.due .num{color:var(--due);} .stat.ok .num{color:var(--ok);}
  .scorecard{display:flex; flex-wrap:wrap; align-items:center; gap:14px; background:var(--hero); border:1px solid var(--hero-line); color:#fff; border-radius:var(--radius-lg); padding:16px 18px; margin-bottom:10px; box-shadow:var(--glass-edge), var(--shadow);}
  .scorecard .score-main{flex:1; min-width:150px;}
  .scorecard .score-lab{font-size:12.5px; opacity:.85;}
  .scorecard .score-total{font-size:38px; font-weight:800; line-height:1.05; font-variant-numeric:tabular-nums;}
  .scorecard .score-side{display:flex; flex-direction:column; gap:5px; min-width:150px;}
  .scorecard .score-row{display:flex; justify-content:space-between; gap:12px; font-size:13px;}
  .scorecard .score-row .k{opacity:.85;}
  .scorecard .score-row .vv{font-weight:700; font-variant-numeric:tabular-nums;}
  .scorecard .vv.pos{color:#c9f7df;} .scorecard .vv.neg{color:#ffd4d4;}
  .score-note{font-size:11.5px; color:var(--on-grad); margin:0 2px 16px; line-height:1.55;}
  .panel{background:var(--card); border:1px solid var(--line); border-radius:var(--radius-lg); padding:16px; margin-bottom:14px; box-shadow:var(--glass-edge);}
  .panel h3{margin:0 0 12px; font-size:14px; letter-spacing:.02em;}
  .panel h3 small{font-weight:500; color:var(--muted); font-size:11.5px; margin-left:6px;}
  .secrow{display:flex; align-items:center; gap:10px; padding:9px 0; border-top:1px solid var(--line);}
  .secrow:first-of-type{border-top:none;}
  .secname{font-weight:700; min-width:84px; flex:none; font-size:13px;}
  .bar{flex:1; height:9px; background:var(--track); border-radius:99px; overflow:hidden;}
  .bar>i{display:block; height:100%; background:var(--ok); border-radius:99px; transition:width .6s var(--ease-liquid);}
  .bar.stack{display:flex;}
  .bar.stack>i{border-radius:0; flex:none;}
  .bar.stack>i.ok{background:var(--ok);} .bar.stack>i.unk{background:var(--unk);} .bar.stack>i.ng{background:var(--ng);}
  .barval{width:104px; flex:none; text-align:right; font-size:12px; color:var(--muted); font-variant-numeric:tabular-nums;}
  .histlegend{display:flex; gap:14px; flex-wrap:wrap; font-size:11.5px; color:var(--muted); margin:6px 2px 2px;}
  .histlegend .dot{display:inline-block; width:8px; height:8px; border-radius:99px; margin-right:5px;}
  .secrow.click{cursor:pointer;}
  .secrow.click:hover .secname{color:var(--primary);}
  .secrow .arw{flex:none; font-size:10px; color:var(--muted); width:12px;}
  .daylist{margin:2px 0 6px; padding:2px 11px; background:var(--card2); border:1px solid var(--line); border-radius:var(--radius-lg); box-shadow:var(--glass-edge);}
  .daylist .logitem{cursor:pointer;}
  .daylist .logitem:hover .l1{color:var(--primary);}
  .startgrid{display:grid; grid-template-columns:repeat(auto-fill,minmax(96px,1fr)); gap:10px; margin-top:4px;}
  .startbtn{background:var(--btn-bg); color:var(--btn-ink); border:none; border-radius:var(--radius-cap); padding:13px 8px; font-family:inherit; font-weight:700; font-size:14px; cursor:pointer; transition:.15s; box-shadow:var(--shadow); text-align:center;}
  .startbtn:hover{filter:brightness(1.06);}
  .startbtn small{display:block; font-weight:500; font-size:10.5px; opacity:.85; margin-top:3px;}
  .startbtn.ghost{background:var(--card2); color:var(--ink); border:1.5px solid var(--line); box-shadow:none;}
  .startbtn.wide{grid-column:1/-1; width:100%; font-size:15px; padding:15px;}
  .startbtn:disabled{opacity:.45; cursor:not-allowed;}
  .subhead{font-size:12px; font-weight:700; color:var(--muted); margin:14px 0 6px;}
  .chkgrid{display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:8px; margin:2px 0;}
  .chk{display:flex; align-items:center; gap:9px; background:var(--card2); border:1.5px solid var(--line); border-radius:14px; padding:10px 12px; font-size:13px; font-weight:600; cursor:pointer; min-height:46px; user-select:none; -webkit-user-select:none; transition:.12s;}
  .chk .mk{flex:none; width:16px; display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:800; line-height:1; color:var(--primary);}
  .chk.on .mk::after{content:'✓';}
  .chk .nm{flex:1; min-width:0; white-space:normal; word-break:break-word; line-height:1.25;}
  .chk small{font-weight:500; color:var(--muted); flex:none;}
  .chk.on{border-color:var(--primary); background:var(--primary-soft);}
  .chk.on .nm{color:var(--ink);}
  .chkbar{display:flex; gap:8px; align-items:center; margin-top:10px; flex-wrap:wrap;}
  .badge.diff-hard{background:var(--ng-soft); color:var(--ng);}
  .badge.diff-normal{background:var(--due-soft); color:var(--due);}
  .badge.diff-easy{background:var(--ok-soft); color:var(--ok);}
  .diff-row{display:flex; gap:7px; align-items:center; flex-wrap:wrap; margin-top:11px;}
  .diff-row span{font-size:12px; color:var(--muted); font-weight:600; flex:none;}
  .diff-btn{border:1.5px solid var(--line); background:var(--card2); border-radius:14px; padding:8px 0; font-family:inherit; font-size:13px; font-weight:700; cursor:pointer; transition:.12s; color:var(--muted); flex:1; min-width:64px; text-align:center;}
  .diff-btn.on-hard{background:var(--ng-soft); border-color:var(--ng); color:var(--ng);}
  .diff-btn.on-normal{background:var(--due-soft); border-color:var(--due); color:var(--due);}
  .diff-btn.on-easy{background:var(--ok-soft); border-color:var(--ok); color:var(--ok);}
  .checkrow{display:flex; align-items:center; gap:8px; font-size:13px; color:var(--muted); margin-top:12px;}
  .checkrow input{width:16px; height:16px; accent-color:var(--primary);}
  .qhead{display:flex; align-items:center; gap:10px; margin-bottom:12px; font-size:12.5px; color:var(--on-grad); flex-wrap:wrap;}
  .qprog{flex:1; min-width:120px; height:6px; background:var(--track); border-radius:99px; overflow:hidden;}
  .qprog>i{display:block; height:100%; background:var(--primary); transition:width .6s var(--ease-liquid);}
  .badge{display:inline-block; font-size:11px; font-weight:700; padding:3px 9px; border-radius:99px;}
  .badge.cat{background:var(--primary-soft); color:var(--primary);}
  .badge.yr{background:var(--card2); color:var(--muted);}
  .qcard{position:relative; background:var(--card); border:1px solid var(--line); border-radius:var(--radius-lg); padding:18px; box-shadow:var(--glass-edge), var(--shadow);}
  .qmeta{display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px;}
  .qhist{display:flex; gap:4px; flex-wrap:wrap; margin-bottom:10px; font-size:15px; line-height:1;}
  .qtext{font-size:15.5px; white-space:pre-wrap; margin-bottom:14px;}
  .qimg{width:100%; border:1px solid var(--line); border-radius:10px; margin-bottom:14px; background:#fff;}
  .qexp{white-space:pre-wrap; font-size:13.5px; color:var(--ink); margin-bottom:4px;}
  .choices{display:flex; flex-direction:column; gap:9px;}

<script>
(function(){
  // ===== Firebase 同期 設定 =====
  // Firebase コンソール > プロジェクトの設定 > マイアプリ の firebaseConfig を貼る。
  // これらは公開識別子でありコミット可（保護は Firestore ルールと承認済みドメインで行う）。
  // authDomain は意図的に Vercel の本番ドメインにする（vercel.json の /__/auth/* rewrite で
  // <projectId>.firebaseapp.com にプロキシし、iOSのITPでもリダイレクト認証が動くようにするため）。
  const FIREBASE_CONFIG = {
    apiKey: "AIzaSyCuZU3w5P5YNFU-Tm_Dn-unIAyaaOZ2zWw",
    authDomain: "s-ckakomon-am.vercel.app", // Vercel本番ドメイン（firebaseapp.comではない・意図的）
    projectId: "sckakomonam-a46eb",
    appId: "1:973281837349:web:113643e0e16c01a09f5acc"
  };
  const SCHEMA_VERSION = 2; // v2: customImages を本体から分離し images/{qid} に保存
  const root = document.getElementById('app-root');

  // シェルの高さは CSS の top:0/bottom:0 固定に一本化（JSでの height 指定は廃止）。

  // ---------- テーマ自動切替: 昼(6〜17時)=オーロラ / 夜(18〜5時)=ナイトグラス ----------
  function applyTheme(){
    const h=new Date().getHours(); const night=(h<6||h>=18);
    root.classList.toggle('night', night);
    document.documentElement.classList.toggle('night', night);
    const m=document.querySelector('meta[name="theme-color"]');
    if(m) m.setAttribute('content', night?'#0b1120':'#0ea5a3'); // グラデ上端色に合わせる
  }
  applyTheme(); setInterval(applyTheme, 60000);

  // ---------- 背景のゆらぎ: 周期性のないランダムウォーク ----------
  // 毎回の目標値・待ち時間とも独立乱数のため往復パターンが生じない。
  // 1レグ約3秒（CSS側のtransition）で変化速度は一定に保つ。
  (function(){
    if(window.matchMedia && matchMedia('(prefers-reduced-motion: reduce)').matches) return;
    function tick(){
      root.style.setProperty('--bg-x', (Math.random()*6-3).toFixed(2)+'%');       // -3%..3%
      root.style.setProperty('--bg-y', (Math.random()*4-2).toFixed(2)+'%');       // -2%..2%
      root.style.setProperty('--bg-hue', (Math.random()*20-10).toFixed(1)+'deg'); // -10..10deg
      setTimeout(tick, 3400+Math.random()*1000); // 3.4〜4.4秒。間隔自体も非周期に
    }
    tick();
  })();

  const $ = s => root.querySelector(s);
  const el = (t,c,h)=>{const e=document.createElement(t); if(c)e.className=c; if(h!=null)e.innerHTML=h; return e;};
  const DAY = 86400000;
  // 旧固定間隔 [0,1,7,30,90] は sched() による適応型スケジューラに置き換え
  const KMAP = {'ア':0,'イ':1,'ウ':2,'エ':3,'1':0,'2':1,'3':2,'4':3};
  const LETTERS = ['ア','イ','ウ','エ'];
  // 計算が必要な問題（全問を分析して分類）。data 側で calc を持たない標準問題はこの集合で判定する。
  const CALC_IDS = new Set([
    'sc-r3a-am1-q04','sc-r3a-am1-q07','sc-r3a-am1-q21','sc-r3a-am1-q24','sc-r3a-am1-q29',
    'sc-r4a-am1-q01','sc-r4a-am1-q03','sc-r4a-am1-q04','sc-r4a-am1-q07','sc-r4a-am1-q08','sc-r4a-am1-q18','sc-r4a-am1-q19','sc-r4a-am1-q24',
    'sc-r5h-am1-q01','sc-r5h-am1-q03','sc-r5h-am1-q04','sc-r5h-am1-q07','sc-r5h-am1-q19',
    'sc-r6h-am1-q01','sc-r6h-am1-q02','sc-r6h-am1-q03','sc-r6h-am1-q07','sc-r6h-am1-q11','sc-r6h-am1-q13','sc-r6h-am1-q18','sc-r6h-am1-q19','sc-r6h-am1-q29',
    'sc-r7a-am1-q01','sc-r7a-am1-q03','sc-r7a-am1-q06','sc-r7a-am1-q07','sc-r7a-am1-q10','sc-r7a-am1-q19','sc-r7a-am1-q29'
  ]);
  const isCalcQ = (id, raw)=> (raw && typeof raw.calc==='boolean') ? raw.calc : CALC_IDS.has(id);
  const DIFF_META = {hard:{l:'ハード',cls:'diff-hard'}, normal:{l:'ノーマル',cls:'diff-normal'}, easy:{l:'イージー',cls:'diff-easy'}};

  // ---------- storage (localStorage, with window.storage / memory fallback) ----------
  const MEM = {};
  let lsOK = false;
  try{ localStorage.setItem('__kakomon_test__','1'); localStorage.removeItem('__kakomon_test__'); lsOK = true; }catch(e){}
  async function jget(k, def){
    if(window.storage){ try{ const r=await window.storage.get(k); if(r&&r.value!=null) return JSON.parse(r.value);}catch(e){} }
    if(lsOK){ try{ const s=localStorage.getItem(k); if(s!=null) return JSON.parse(s); }catch(e){} }
    if(k in MEM) return JSON.parse(MEM[k]);
    return def;
  }
  async function jset(k, v){
    const s = JSON.stringify(v); MEM[k]=s;
    if(window.storage){ try{ await window.storage.set(k,s); return; }catch(e){} }
    if(lsOK){ try{ localStorage.setItem(k,s); return; }catch(e){} }
  }
  async function jdel(k){
    delete MEM[k];
    if(window.storage){ try{ await window.storage.delete(k);}catch(e){} }
    if(lsOK){ try{ localStorage.removeItem(k); }catch(e){} }
  }

  // ---------- state ----------
  let questions = [];        // {id,section,year,exam,category,question,choices[4],answer,explanation,hasImage}
  let progress = {};         // id -> {attempts:[{t,ok,unknown}], level, due}
  const imgCache = {};       // id -> dataURL
  let session = null;        // {ids:[], total, done:Set, seen:Set, label}
  let difficulty = {};       // id -> 'hard'|'normal'|'easy'
  const bundledIds = new Set(); // data/ から読み込んだ標準問題のID（同期対象外の判定に使う）

  async function loadImage(id){
    if(id in imgCache) return imgCache[id];
    const v = await jget('kakomon:img:'+id, null);
    imgCache[id]=v; return v;
  }
  async function setDiff(id, val){
    if(val) difficulty[id]=val; else delete difficulty[id];
    await jset('kakomon:difficulty', difficulty);
    if(typeof schedulePush==='function') schedulePush();
  }

  // ---------- SRS（忘却曲線ベースの適応型スケジューラ） ----------
  // 解答履歴だけから状態を決める純関数。record・同期マージ・起動時移行で共用。
  //  ivl: 復習間隔(日)＝記憶の安定度の推定値 / ef: 項目ごとの覚えやすさ(1.3〜2.8)
  //  正解: 1日→3日→×ef と延長。期限を大きく過ぎてなお正解＝記憶が強い(+15%)
  //  不正解: 完全リセットせず間隔を4割残す（再学習は初学より速い）。ef を減らして
  //  その項目の以後の延び方を抑える。「分からない」は誤答よりefの減りを軽く。
  function sched(attempts){
    let ef=2.3, ivl=0, due=0, lapses=0, streak=0;
    (attempts||[]).forEach(a=>{
      if(a.ok){
        const late = due>0 && a.t>due+ivl*DAY*0.5;
        if(ivl<1) ivl=1;
        else if(ivl<3) ivl=3;
        else ivl=Math.min(180, Math.round(ivl*ef*(late?1.15:1)));
        ef=Math.min(2.8, ef+0.03); streak++;
        due=a.t+ivl*DAY;
      } else {
        ef=Math.max(1.3, ef-(a.unknown?0.15:0.2));
        ivl=Math.max(1, Math.round(ivl*0.4));
        lapses++; streak=0;
        due=a.t+DAY;
      }
    });
    const level = ivl<1?0 : ivl<3?1 : ivl<10?2 : ivl<40?3 : 4; // 旧level互換
    return {ivl, ef:Math.round(ef*100)/100, due, lapses, streak, level};
  }
  // 予測記憶保持率 R=exp(-経過日数/安定度)。低いほど忘れかけている。
  function retention(p, now){
    if(!p||!p.attempts.length) return null;
    const days=Math.max(0,(now-p.attempts[p.attempts.length-1].t)/DAY);
    return Math.exp(-days/Math.max(0.5, p.ivl||1));
  }
  function record(id, ok, unknown){
    const now=Date.now();
    let p=progress[id]; if(!p){p={attempts:[]};progress[id]=p;}
    p.attempts.push({t:now, ok:!!ok, unknown:!!unknown});
    Object.assign(p, sched(p.attempts));
    jset('kakomon:progress', progress);
    if(typeof schedulePush==='function') schedulePush();
  }
  function groupOf(q){
    const p=progress[q.id]; const now=Date.now();
    if(!p||!p.attempts.length) return 0;            // 未回答
    if(p.due<=now){ return p.attempts[p.attempts.length-1].ok ? 2 : 1; } // due復習 / due前回不正解
    return 3;                                        // 未来(期限前)
  }
  const secLabel = s => (s==='午前2' ? '午前II' : '午前I');  // section値(算用数字)→表示(ローマ数字)
  // 上部トグルで選ぶ現在の区分。ホーム／履歴／問題管理の表示をこの区分に絞る（学習セッションは対象外）。
  let activeSection = '午前1';
  const secOf = q => (q.section||'午前1');
  const inActiveSection = q => secOf(q)===activeSection;
  function matchFilter(q,f){
    if(!f) return true;
    if(f.section && (q.section||'午前1')!==f.section) return false;
    if(f.sections && f.sections.length && f.sections.indexOf(q.section||'午前1')<0) return false;
    if(f.year && q.year!==f.year) return false;
    if(f.category && q.category!==f.category) return false;
    if(f.categories && f.categories.length && f.categories.indexOf(q.category)<0) return false;
    if(f.calc==='yes' && !q.calc) return false;
    if(f.calc==='no' && q.calc) return false;
    if(f.diffs && f.diffs.length){ const qd=difficulty[q.id]||'unset'; if(f.diffs.indexOf(qd)<0) return false; }
    return true;
  }
  function buildQueue(filter, includeAll){
    const now=Date.now();
    // 区分ごとの正答率（未着手の新規問題は弱い区分から出すため）
    const catAcc={};
    questions.forEach(q=>{
      const p=progress[q.id]; if(!p||!p.attempts.length) return;
      const c=catAcc[q.category]||(catAcc[q.category]={t:0,c:0});
      p.attempts.forEach(a=>{ c.t++; if(a.ok)c.c++; });
    });
    const list=questions.filter(q=>matchFilter(q,filter));
    const rows=list.map(q=>{
      const p=progress[q.id]; const g=groupOf(q);
      const d=difficulty[q.id];
      const dw = d==='hard'?0.15 : d==='easy'?-0.1 : 0; // 体感難易度で微調整
      let bucket, pr;
      if(g===0){ // 新規: 正答率の低い区分を優先（実績3件未満の区分は中立0.5）
        const ca=catAcc[q.category];
        const weak = (ca&&ca.t>=3) ? 1-(ca.c/ca.t) : 0.5;
        bucket=1; pr=weak+dw+Math.random()*0.15;
      } else { // 既習: 忘れかけ(1-R)×間違えやすさ(lapses)で優先度
        const R=retention(p, now);
        pr=(1-R)+Math.min(p.lapses||0,5)*0.06+dw+Math.random()*0.02;
        bucket=(p.due<=now)?0:2;
      }
      return {q, bucket, pr};
    });
    // bucket 0=復習期限到来（忘れかけ順）→ 1=新規（弱点区分順）→ 2=期限前（includeAll時のみ）
    const pool = includeAll ? rows : rows.filter(r=>r.bucket<2);
    pool.sort((x,y)=> x.bucket-y.bucket || y.pr-x.pr);
    return pool.map(r=>r.q.id);
  }

  // ---------- views switching ----------
  let currentView='home';
  // タブ選択ハイライトは#tabGliderが液体的にスライドして追従する。
  // 管理画面（ハンバーガーで開く）はタブに無いので、その時はグライダーを隠す。
  function moveGlider(){
    const t=root.querySelector('.tab[aria-selected="true"]'), g=$('#tabGlider');
    if(!g) return;

    g.style.width=t.offsetWidth+'px';

  function show(view){

  root.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>show(t.dataset.view)));

  // AMⅠ/AMⅡ の切替。ホーム／履歴／問題管理を対象に絞る（学習は対象外）。dir>0で左方向へ入るカード演出。
  async function switchSection(sec, dir){
    if(sec===activeSection) return;
    activeSection=sec;
    jset('kakomon:activeSection', sec);
    root.querySelectorAll('.sec-btn').forEach(b=>b.setAttribute('aria-selected', b.dataset.sec===sec));
    moveSecGlider();
    // 学習タブは区分の影響を受けない。それ以外は再描画してカード風にスライドイン。
    if(currentView==='study') return;
    if(currentView==='home') renderHome();
    else if(currentView==='hist') renderHist();
    else if(currentView==='manage') renderManage();
    const av=$('#view-'+currentView);
    if(av){
      const cls = dir<0 ? 'sec-in-l' : 'sec-in-r';
      av.classList.remove('sec-in-l','sec-in-r'); void av.offsetWidth; av.classList.add(cls);
      av.addEventListener('animationend',()=>av.classList.remove(cls),{once:true});
    }
    window.scrollTo(0,0);
  }
  const SECS=['午前1','午前2'];
  root.querySelectorAll('.sec-btn').forEach(b=>b.addEventListener('click',()=>{
    const target=b.dataset.sec, dir = SECS.indexOf(target)>SECS.indexOf(activeSection) ? 1 : -1;
    switchSection(target, dir);
  }));
  window.addEventListener('resize', ()=>{ moveGlider(); moveSecGlider(); });
  // 初回配置はtransition無しで一発で合わせる（スライドインを防止）。
  (function(){
    const g=$('#tabGlider'), sg=$('#secGlider');
    if(g) g.style.transition='none'; if(sg) sg.style.transition='none';
    moveGlider(); moveSecGlider();
    requestAnimationFrame(()=>{ if(g) g.style.transition=''; if(sg) sg.style.transition=''; });
    setTimeout(()=>{ moveGlider(); moveSecGlider(); }, 300);
  })();

  // ---------- スワイプで区分（AMⅠ/AMⅡ）切り替え（タッチデバイス） ----------
  // タブ切替のスワイプは廃止。左右スワイプは区分トグルの切り替えに割り当てる。
  (function(){
    const MIN_X=55, MAX_Y_RATIO=0.6; // 水平55px以上、かつ垂直より水平が優勢
    let sx=0, sy=0, locked=false;
    root.addEventListener('touchstart', e=>{
      if(e.touches.length!==1){locked=true; return;}
      locked=false; sx=e.touches[0].clientX; sy=e.touches[0].clientY;
    }, {passive:true});
    root.addEventListener('touchend', e=>{
      if(locked||e.changedTouches.length!==1) return;
      if(currentView==='study') return; // 学習中は区分スワイプ無効
      const dx=e.changedTouches[0].clientX-sx, dy=e.changedTouches[0].clientY-sy;
      if(Math.abs(dx)<MIN_X || Math.abs(dy)>Math.abs(dx)*MAX_Y_RATIO) return;
      const cur=SECS.indexOf(activeSection);
      const next = dx<0 ? Math.min(cur+1,SECS.length-1) : Math.max(cur-1,0);
      if(next!==cur) switchSection(SECS[next], dx<0?1:-1);
    }, {passive:true});
  })();

  // documentスクロール構成に戻したため、バウンス抑止のtouchmoveガードは撤去。
  // ラバーバンドで見える地色はバーと同色にしてあり自然に見える。

  // ---------- SCORE ----------
  // 採点ルール:
  //  ・1問ごと: 正解 +1 / 不正解(「分からない」含む) -1 / 解答すれば(正誤問わず) +0.1
  //  ・1日の問題数ボーナス: 10問ごとに +1（10問+1・20問+2・30問+3…上限なし）
  //  ・上記のプラス点(正解+1・+0.1・問数ボーナス)には連続日数の複利倍率 1.1^(連続日数-1) をかける
  //    （マイナスの -1 には倍率をかけない）。スコアは attempts のログから毎回導出する。
  function dayMs(t){ const d=new Date(t); d.setHours(0,0,0,0); return d.getTime(); }
  function volBonus(n){ return Math.floor(n/10); }   // 10問ごとに +1（上限なし）
  function computeScore(){
    const days={};                                   // 0時ms -> {answered, correct}
    Object.values(progress).forEach(p=>p.attempts.forEach(a=>{
      const k=dayMs(a.t); let s=days[k]||(days[k]={answered:0, correct:0});
      s.answered++; if(a.ok) s.correct++;
    }));
    const keys=Object.keys(days).map(Number).sort((a,b)=>a-b);
    const todayK=dayMs(Date.now());
    let total=0, today=0, todayStreak=0, todayCount=0, prevK=null, streak=0;
    keys.forEach(k=>{
      streak = (prevK!=null && Math.round((k-prevK)/DAY)===1) ? streak+1 : 1;
      prevK=k;
      const s=days[k], wrong=s.answered-s.correct;
      const mult=Math.pow(1.1, streak-1);
      const plus=(s.correct + s.answered*0.1 + volBonus(s.answered))*mult;
      const dayScore=plus - wrong;
      total+=dayScore;
      if(k===todayK){ today=dayScore; todayStreak=streak; todayCount=s.answered; }
    });
    return {total, today, todayStreak, todayCount};
  }
  function fmtScore(x){ let r=Math.round(x*10)/10; if(r===0) r=0; return r.toFixed(1); }

  // ---------- HOME ----------
  function renderHome(){
    const v=$('#view-home'); v.innerHTML='';

    let nNew=0,nDueWrong=0,nDueRev=0,answered=0,correct=0;
    qs.forEach(q=>{const g=groupOf(q); if(g===0)nNew++; else if(g===1)nDueWrong++; else if(g===2)nDueRev++;
      const p=progress[q.id]; if(p) p.attempts.forEach(a=>{answered++; if(a.ok)correct++;});});

    if(!questions.length){
      v.appendChild(el('div','empty','<div class="big">📚</div><div>まだ問題がありません。<br>通常は自動で読み込まれます。<br>別端末のデータは「問題管理」→クラウド同期、またはバックアップから復元できます。</div>'));
      return;
    }
    if(!qs.length){
      v.appendChild(el('div','empty','<div class="big">📭</div><div>この区分（'+secLabel(activeSection)+'）の問題はまだありません。<br>上部の区分トグルで切り替えてください。</div>'));

      '<div class="score-main"><div class="score-lab">累計スコア</div>'
      +'<div class="score-total">'+fmtScore(sc.total)+'</div></div>'
      +'<div class="score-side">'
      +'<div class="score-row"><span class="k">今日のスコア</span><span class="vv '+(sc.today>=0?'pos':'neg')+'">'+sgn(sc.today)+'</span></div>'
      +'<div class="score-row"><span class="k">今日の問題数</span><span class="vv">'+sc.todayCount+'問</span></div>'
      +'<div class="score-row"><span class="k">連続</span><span class="vv">'+sc.todayStreak+'日'+(sc.todayStreak>1?' ×'+mult.toFixed(2):'')+'</span></div>'
      +'</div>';
    v.appendChild(hero);
    v.appendChild(el('div','score-note','正解 +1 ／ 不正解 −1 ／ 解答するだけで +0.1。1日10問ごとに +1（20問で+2・30問で+3…）。連続日数でプラス点が複利（×1.1／日）。'));

    const grid=el('div','grid');
    grid.appendChild(el('div','stat new','<div class="num">'+nNew+'</div><div class="lab">未回答</div>'));
    grid.appendChild(el('div','stat ng','<div class="num">'+nDueWrong+'</div><div class="lab">前回不正解（復習）</div>'));
    grid.appendChild(el('div','stat due','<div class="num">'+nDueRev+'</div><div class="lab">復習期限到来</div>'));
    grid.appendChild(el('div','stat ok','<div class="num">'+(answered?Math.round(correct/answered*100):0)+'%</div><div class="lab">通算正答率（'+correct+'/'+answered+'）</div>'));
    v.appendChild(grid);

    // start session
    const p=el('div','panel'); p.appendChild(el('h3',null,'今すぐ学習を始める'));
    const dueTotal=nNew+nDueWrong+nDueRev;
    const rec=el('button','startbtn wide','おすすめ（忘却曲線順）<small>'+ (dueTotal? '未回答＋復習 '+dueTotal+'問' : '今日の復習はありません・全問から出題') +'</small>');
    rec.addEventListener('click',()=>startSession({section:activeSection}, dueTotal===0, 'おすすめ・'+secLabel(activeSection)));
    p.appendChild(rec);
    v.appendChild(p);

    // by year（現在の区分のみ）
    const years=[...new Set(qs.map(q=>q.year))].filter(Boolean);
    if(years.length){
      const yp=el('div','panel'); yp.appendChild(el('h3',null,'年度別に学習','<small>全問を忘却曲線順で</small>'));
      const g=el('div','startgrid');
      years.forEach(y=>{
        const cnt=qs.filter(q=>q.year===y).length;
        const label=y+' '+secLabel(activeSection);
        const b=el('button','startbtn ghost', y+'<small>'+cnt+'問</small>');
        b.addEventListener('click',()=>startSession({year:y, section:activeSection}, true, label));
        g.appendChild(b);
      });
      yp.appendChild(g); v.appendChild(yp);
    }
    // by category (+ calc) — checkbox multi-select（現在の区分のみ）
    const cats=[...new Set(qs.map(q=>q.category))].filter(Boolean);
    if(cats.length){
      const cp=el('div','panel'); cp.appendChild(el('h3',null,'区分を選んで学習','<small>複数選択可・忘却曲線順で出題</small>'));

      // タップ／クリックで選択を切り替えるチップ（チェックボックスは使わない）
      function chip(grid, val, label, count, on){
        const c=el('div','chk'+(on?' on':'')); c.dataset.val=val;
        c.appendChild(el('span','mk',''));
        c.appendChild(el('span','nm', escapeHTML(label)));
        if(count!=null) c.appendChild(el('small',null, count+'問'));
        c.addEventListener('click',()=>{ c.classList.toggle('on'); updateCount(); });
        grid.appendChild(c); return c;
      }
      function selBar(chips){
        const bar=el('div','chkbar');
        const a=el('button','btn sec sm','全て選択'); const n=el('button','btn sec sm','全て解除');
        a.addEventListener('click',()=>{ chips.forEach(c=>c.classList.add('on')); updateCount(); });
        n.addEventListener('click',()=>{ chips.forEach(c=>c.classList.remove('on')); updateCount(); });
        bar.appendChild(a); bar.appendChild(n); return bar;
      }

      cp.appendChild(el('div','subhead','分類'));
      const cg=el('div','chkgrid'); const catChips=[];
      cats.forEach(c=>{ const cnt=qs.filter(q=>q.category===c).length; catChips.push(chip(cg, c, c, cnt, true)); });
      cp.appendChild(cg);
      cp.appendChild(selBar(catChips));

      cp.appendChild(el('div','subhead','計算の有無'));
      const calcG=el('div','chkgrid');
      const calcN=qs.filter(q=>q.calc).length, nonCalcN=qs.length-calcN;
      const calcYesChip=chip(calcG,'yes','計算問題',calcN,true), calcNoChip=chip(calcG,'no','計算以外',nonCalcN,true);
      cp.appendChild(calcG);
      cp.appendChild(selBar([calcYesChip, calcNoChip]));

      cp.appendChild(el('div','subhead','難易度'));
      const diffG=el('div','chkgrid'); diffG.style.gridTemplateColumns='repeat(2,1fr)';
      const diffChips={};
      [['hard','ハード'],['normal','ノーマル'],['easy','イージー'],['unset','未設定']].forEach(([v,lbl])=>{
        const cnt=qs.filter(q=>(difficulty[q.id]||'unset')===v).length;
        diffChips[v]=chip(diffG, v, lbl, cnt, true);
      });
      cp.appendChild(diffG);
      cp.appendChild(selBar(Object.values(diffChips)));

      const startB=el('button','startbtn wide'); startB.style.marginTop='12px'; cp.appendChild(startB);
      const cmsg=el('div','msg'); cp.appendChild(cmsg);

      function selected(){
        const sc=catChips.filter(c=>c.classList.contains('on')).map(c=>c.dataset.val);
        const yes=calcYesChip.classList.contains('on'), no=calcNoChip.classList.contains('on');
        let calc=null; if(yes&&!no)calc='yes'; else if(no&&!yes)calc='no';
        const dsel=Object.keys(diffChips).filter(v=>diffChips[v].classList.contains('on'));
        // 全4つ選択中はフィルタなし（diffs=null）
        const diffs=(dsel.length===4||dsel.length===0)?null:dsel;
        return {categories:sc, calc, yes, no, diffs, dsel};
      }
      function matchCount(f){ return questions.filter(q=>matchFilter(q,{categories:f.categories, calc:f.calc, diffs:f.diffs, section:activeSection})).length; }
      function updateCount(){
        const f=selected();
        const n=(!f.categories.length || (!f.yes&&!f.no) || f.dsel.length===0) ? 0 : matchCount(f);
        startB.innerHTML='選択した区分で学習<small>'+n+' 問</small>';
        startB.disabled=(n===0);
      }
      startB.addEventListener('click',()=>{
        const f=selected();
        if(!f.categories.length){ flash(cmsg,'bad','分類を1つ以上選択してください。'); return; }
        if(!f.yes&&!f.no){ flash(cmsg,'bad','「計算問題」「計算以外」のいずれかを選択してください。'); return; }
        if(!f.dsel.length){ flash(cmsg,'bad','難易度を1つ以上選択してください。'); return; }
        const diffLab=f.diffs ? '・'+(f.diffs.map(d=>DIFF_META[d]?DIFF_META[d].l:'未設定').join('/')) : '';
        const lab=secLabel(activeSection)+'・'+(f.categories.length===cats.length?'全分類':(f.categories.length===1?f.categories[0]:f.categories.length+'分類'))
          + (f.calc==='yes'?'・計算':f.calc==='no'?'・計算以外':'') + diffLab;
        startSession({categories:f.categories, calc:f.calc, diffs:f.diffs, section:activeSection}, true, lab);
      });
      updateCount();
      v.appendChild(cp);
    }
  }

  // ---------- SESSION / STUDY ----------
  function startSession(filter, includeAll, label){
    const ids=buildQueue(filter, includeAll);
    if(!ids.length){
      session=null; show('study');
      $('#view-study').innerHTML='';
      $('#view-study').appendChild(el('div','empty','<div class="big">🎉</div><div>対象の問題がありません。<br>復習期限が来たらここに表示されます。</div>'));
      return;
    }
    session={ids:ids.slice(), total:ids.length, done:new Set(), seen:new Set(), label:label||'おすすめ'};
    show('study');
  }
  function replayQuestion(id){ // 履歴から1問だけ解き直す（回答は通常どおり記録・不正解でも再出題しない）
    session={ids:[id], total:1, done:new Set(), seen:new Set(), label:'解き直し', single:true};
    show('study');
  }
  function renderStudy(){
    const v=$('#view-study'); v.innerHTML='';
    if(!session){
      if(!questions.length){ v.appendChild(el('div','empty','<div class="big">📚</div><div>問題を取り込むと学習できます。</div>')); return; }
      v.appendChild(el('div','empty','<div class="big">▶</div><div>「ホーム」から学習を始めてください。</div>'));
      return;
    }
    if(!session.ids.length){
      const done=session.done.size;
      v.appendChild(el('div','empty','<div class="big">🎉</div><div>セッション完了！<br>'+done+' 問を学習しました。</div>'));
      const b=el('button','btn',''); b.textContent='ホームに戻る'; b.style.marginTop='14px';
      b.addEventListener('click',()=>{session=null; show('home');}); v.appendChild(b);
      session=null; return;
    }
    const id=session.ids[0];
    const q=questions.find(x=>x.id===id);
    if(!q){ session.ids.shift(); return renderStudy(); }
    renderQuiz(v,q);
  }
  async function renderQuiz(v,q){
    const seenN=session.seen.size;
    const remaining=Math.max(0, session.total-seenN);
    const denom=session.total;
    const head=el('div','qhead');
    head.appendChild(el('span',null,'残り '+remaining+' 問'));
    const pr=el('div','qprog'); pr.appendChild(el('i',null,'')); pr.firstChild.style.width=(denom?Math.round(seenN/denom*100):0)+'%';
    head.appendChild(pr);
    head.appendChild(el('span',null,session.label));
    const endBtn=el('button','btn sec sm','終了'); endBtn.style.flex='none';
    endBtn.addEventListener('click',()=>{
      if(session.single){ session=null; show('hist'); return; }
      if(confirm('学習を終了しますか？\nここまでの回答は記録されています。')){ session=null; show('home'); }
    });
    head.appendChild(endBtn);
    v.appendChild(head);

    const card=el('div','qcard');
    const meta=el('div','qmeta');
    if(q.category) meta.appendChild(el('span','badge cat',q.category));
    meta.appendChild(el('span','badge yr',(q.exam||q.year||'')));
    const diffBadgeSlot=el('span'); // 難易度バッジ（回答前は現在設定値を表示）
    function refreshDiffBadge(){ const d=difficulty[q.id]; diffBadgeSlot.innerHTML=d?'<span class="badge '+DIFF_META[d].cls+'">'+DIFF_META[d].l+'</span>':''; }
    refreshDiffBadge(); meta.appendChild(diffBadgeSlot);
    card.appendChild(meta);
    const pastAtt=(progress[q.id]||{}).attempts||[];
    if(pastAtt.length){
      const hist=el('div','qhist');
      pastAtt.slice(-10).reverse().forEach(a=>{ hist.appendChild(el('span',null, a.ok?'⭕':'✖')); });
      card.appendChild(hist);
    }
    card.appendChild(el('div','qtext', escapeHTML(q.question)));

    if(q.hasImage){
      const im=el('img','qimg'); im.alt='図';
      const d=await loadImage(q.id); if(d){ im.src=d; card.appendChild(im); }
    }
    const ch=el('div','choices');
    const btns=[];
    q.choices.forEach((c,i)=>{
      const b=el('button','choice');
      b.appendChild(el('span','k',LETTERS[i]));
      b.appendChild(el('span','txt',escapeHTML(c)));
      // 消去法: 文をタップでグレーアウト（消去）、番号(ア〜エ)をタップしたときだけ回答判定。
      // 消去済みの選択肢はどこをタップしても復元のみ（誤答防止）。
      b.addEventListener('click',e=>{
        if(b.disabled) return;
        if(b.classList.contains('eliminated')){ b.classList.remove('eliminated'); return; }
        if(e.target.closest('.k')) answer(i,false);
        else b.classList.add('eliminated');
      });
      ch.appendChild(b); btns.push(b);
    });
    card.appendChild(ch);
    card.appendChild(el('div','elimhint','文をタップ＝消去（もう一度タップで戻す）／ 番号（ア〜エ）をタップ＝回答'));
    const dun=el('button','dunno','？ 分からない（不正解として記録）');
    dun.addEventListener('click',()=>answer(-1,true));
    card.appendChild(dun);
    if(!session.single){
      const skip=el('button','skipbtn','スキップ（未回答のまま次へ）');
      skip.addEventListener('click',()=>{
        session.ids.shift();
        if(session.ids.indexOf(q.id)===-1) session.ids.push(q.id);
        $('#view-study').innerHTML=''; renderStudy();
      });
      card.appendChild(skip);
    }
    const fb=el('div'); fb.id='fb'; card.appendChild(fb);
    v.appendChild(card);

    function answer(sel, unknown){
      const ok = (!unknown && sel===q.answer);
      btns.forEach((b,i)=>{ b.disabled=true; if(i===q.answer)b.classList.add('correct'); if(i===sel && !ok)b.classList.add('wrong'); });
      dun.disabled=true; dun.style.opacity=.5;
      record(q.id, ok, unknown);
      // queue update
      session.ids.shift();
      session.seen.add(q.id);
      if(ok){ session.done.add(q.id); }
      else if(!session.single){ if(session.ids.indexOf(q.id)===-1) session.ids.push(q.id); } // re-queue at end（1問解き直しは再出題しない）
      if(ok){ // 正解のいいね演出
        const like=el('div','like-burst','👍');
        card.appendChild(like);
        like.addEventListener('animationend',()=>like.remove());
      }
      const fbx=el('div','feedback '+(ok?'ok':'ng'));
      const title = ok?'正解':(unknown?'分からない（不正解）':'不正解');
      fbx.appendChild(el('div','ftitle',(ok?'👍 ':'✕ ')+title+'　<span style="font-weight:600;font-size:12px;color:var(--muted)">正解：'+LETTERS[q.answer]+'</span>'));

  // ---------- HISTORY ----------
  let histMode='stats';

  function allAttempts(){
    const out=[];
    questions.forEach(q=>{ const p=progress[q.id]; if(p) p.attempts.forEach(a=>out.push({q,a})); });

  function fmtDT(t){

    return d.getFullYear()+'/'+p(d.getMonth()+1)+'/'+p(d.getDate())+' '+p(d.getHours())+':'+p(d.getMinutes());

  function renderStats(v,atts){
    let ok=0,ng=0,unk=0;
    atts.forEach(({a})=>{ if(a.unknown)unk++; else if(a.ok)ok++; else ng++; });
    const tot=atts.length;
    const grid=el('div','grid');
    grid.appendChild(el('div','stat ok','<div class="num">'+(tot?Math.round(ok/tot*100):0)+'%</div><div class="lab">正答率（'+ok+'/'+tot+'）</div>'));
    grid.appendChild(el('div','stat unk','<div class="num">'+unk+'</div><div class="lab">「分からない」回数</div>'));
    v.appendChild(grid);

    // 学習量: 期間切替（14日〜1年）・正誤内訳の積み上げバー・日付タップで当日の問題一覧→解き直し
    const rp=el('div','panel'); rp.appendChild(el('h3',null,'学習量'));
    const pseg=el('div','seg'); pseg.style.marginBottom='4px';
    HIST_PERIODS.forEach(([d,lab])=>{
      const b=el('button',null,lab); b.setAttribute('aria-pressed', histPeriod===d);
      b.addEventListener('click',()=>{histPeriod=d; histOpenDay=null; renderHist();});
      pseg.appendChild(b);
    });
    rp.appendChild(pseg);
    const lg=el('div','histlegend');
    [['var(--ok)','正解'],['var(--unk)','分からない'],['var(--ng)','不正解']].forEach(([c,lab])=>{
      lg.appendChild(el('span',null,'<span class="dot" style="background:'+c+'"></span>'+lab));
    });
    rp.appendChild(lg);

    const dayStat={}; // 0時ms -> {ok,unk,ng,items:[{q,a}]}
    atts.forEach(it=>{
      const k=dayMs(it.a.t); let s=dayStat[k]||(dayStat[k]={ok:0,unk:0,ng:0,items:[]});
      if(it.a.unknown)s.unk++; else if(it.a.ok)s.ok++; else s.ng++; s.items.push(it);
    });
    const todayK=dayMs(Date.now()); const fromK=todayK-(histPeriod-1)*DAY;
    let days=[];
    if(histPeriod<=30){ for(let k=todayK;k>=fromK;k-=DAY) days.push(k); }                 // 0問の日も表示
    else { days=Object.keys(dayStat).map(Number).filter(k=>k>=fromK).sort((a,b)=>b-a); }   // 学習した日だけ
    const maxd=Math.max(1,...days.map(k=>{const s=dayStat[k]; return s?s.ok+s.unk+s.ng:0;}));
    const WD=['日','月','火','水','木','金','土'];
    const cy=new Date().getFullYear();
    if(!days.length) rp.appendChild(el('div','mini','この期間の学習履歴はありません。'));
    days.forEach(k=>{
      const s=dayStat[k]; const n=s?s.ok+s.unk+s.ng:0; const dt=new Date(k);
      const open = histOpenDay===k;
      const row=el('div','secrow'+(n?' click':''));
      row.appendChild(el('span','arw', n?(open?'▼':'▶'):''));
      row.appendChild(el('div','secname',(dt.getFullYear()!==cy?dt.getFullYear()+'/':'')+(dt.getMonth()+1)+'/'+dt.getDate()+'('+WD[dt.getDay()]+')'));
      const bar=el('div','bar stack');
      if(s){ [['ok',s.ok],['unk',s.unk],['ng',s.ng]].forEach(([cls,c])=>{ if(c){const i=el('i',cls,''); i.style.width=(c/maxd*100)+'%'; bar.appendChild(i);} }); }
      row.appendChild(bar);
      row.appendChild(el('div','barval', n+' 問'));
      if(n) row.addEventListener('click',()=>{ histOpenDay=open?null:k; renderHist(); });
      rp.appendChild(row);
      if(open&&s){
        const dl=el('div','daylist');
        s.items.forEach(({q,a})=>{
          const res=a.unknown?'unk':(a.ok?'ok':'ng');
          const r2=el('div','logitem');
          r2.appendChild(el('span','logdot '+res,''));
          const m=el('div','logmain');
          m.appendChild(el('div','l1',(q.exam||q.year||'')+(q.category?'　'+q.category:'')));
          m.appendChild(el('div','l2',fmtDT(a.t)+'　タップで解き直し'));
          r2.appendChild(m);
          r2.appendChild(el('span','logres '+res, a.unknown?'分からない':(a.ok?'正解':'不正解')));
          r2.addEventListener('click',()=>replayQuestion(q.id));
          dl.appendChild(r2);
        });
        rp.appendChild(dl);
      }
    });
    v.appendChild(rp);

    v.appendChild(breakdownPanel('分類別の正答率', 'category', atts));
    v.appendChild(breakdownPanel('年度別の正答率', q=>q.year||null, atts));
  }
  function breakdownPanel(title, key, atts){
    const kf = typeof key==='function' ? key : (q=>q[key]);
    const m={};
    atts.forEach(({q,a})=>{ const g=kf(q)||'—'; if(!m[g])m[g]={t:0,c:0}; m[g].t++; if(a.ok&&!a.unknown)m[g].c++; });
    const keys=Object.keys(m).sort((x,y)=> (m[x].c/m[x].t) - (m[y].c/m[y].t));
    const p=el('div','panel'); p.appendChild(el('h3',null,title));
    keys.forEach(g=>{
      const r=m[g]; const pct=Math.round(r.c/r.t*100);
      const row=el('div','secrow');
      row.appendChild(el('div','secname',g));
      const bar=el('div','bar'); const i=el('i',null,''); i.style.width=pct+'%';
      i.style.background = pct>=70?'var(--ok)':(pct>=50?'var(--due)':'var(--ng)');
      bar.appendChild(i); row.appendChild(bar);
      row.appendChild(el('div','barval', pct+'%（'+r.c+'/'+r.t+'）'));
      p.appendChild(row);
    });
    return p;
  }

  function normAnswer(a){
    if(typeof a==='number') return (a>=0&&a<=3) ? a : (a>=1&&a<=4 ? a-1 : 0);
    if(typeof a==='string'){ const t=a.trim(); if(t in KMAP) return KMAP[t]; const n=parseInt(t,10); if(!isNaN(n)) return (n>=0&&n<=3)?n:(n>=1&&n<=4?n-1:0); }
    return 0;
  }
  async function upsert(arr){
    let added=0,updated=0;
    const byId={}; questions.forEach((q,i)=>byId[q.id]=i);
    for(const raw of arr){
      const id = raw.id || ('imp-'+Math.random().toString(36).slice(2,10));
      const rec={
        id, section: raw.section||'午前1', year: raw.year||'', exam: raw.exam||raw.year||'',
        category: raw.category||'未分類', question: raw.question||'',
        choices:(raw.choices||[]).slice(0,4), answer: normAnswer(raw.answer),
        explanation: raw.explanation||'', hasImage: !!raw.image, calc: isCalcQ(id, raw)
      };
      if(raw.image){ await jset('kakomon:img:'+id, raw.image); imgCache[id]=raw.image; }
      if(id in byId){ questions[byId[id]]=rec; updated++; }
      else { byId[id]=questions.length; questions.push(rec); added++; }
    }
    await jset('kakomon:questions', questions);
    if(typeof schedulePush==='function') schedulePush();
    return {added, updated};
  }
  function exportAll(){
    const out={questions:questions.map(q=>{ const o=Object.assign({},q); if(q.hasImage&&imgCache[q.id])o.image=imgCache[q.id]; delete o.hasImage; return o; }), progress};
    const blob=new Blob([JSON.stringify(out)],{type:'application/json'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='sc_kakomon_backup.json'; a.click();
    setTimeout(()=>URL.revokeObjectURL(a.href),2000);
    flash($('#smsg'),'good','エクスポートしました（画像・進捗を含む）。');
  }
  // バックアップJSON（またはエクスポート形式）から復元。進捗は時刻ユニオンでマージし、
  // 既存の履歴を消さない。カスタム問題・画像も取り込む。
  async function importBackup(file){
    try{
      const data=JSON.parse(await file.text());
      const arr=Array.isArray(data)?data:(data.questions||data.customQuestions||[]);
      // 旧Drive同期形式は画像を customImages に別持ち → 各問題へ添付
      if(data.customImages) arr.forEach(q=>{ if(q&&q.id&&!q.image&&data.customImages[q.id]) q.image=data.customImages[q.id]; });
      let qres={added:0,updated:0};
      if(arr.length) qres=await upsert(arr); // 画像も含めて取り込み
      let pcount=0;
      if(data.progress && typeof data.progress==='object'){
        progress=mergeProgress(progress, data.progress);
        pcount=Object.keys(data.progress).length;
        await jset('kakomon:progress', progress);
      }
      if(data.difficulty && typeof data.difficulty==='object'){
        Object.assign(difficulty, data.difficulty);
        await jset('kakomon:difficulty', difficulty);
      }
      if(typeof schedulePush==='function') schedulePush();
      renderManage();
      flash($('#smsg'),'good','復元しました（問題 +'+qres.added+'/更新'+qres.updated+'、進捗 '+pcount+'件をマージ）。');
    }catch(e){ console.error(e); flash($('#smsg'),'bad','復元に失敗しました。バックアップJSONを確認してください。'); }
  }
  async function resetAll(){
    if(!confirm('登録済みの問題と学習履歴をすべて削除します。よろしいですか？')) return;
    for(const q of questions){ if(q.hasImage) await jdel('kakomon:img:'+q.id); await jdel('kakomon:ai:'+q.id); }
    questions=[]; progress={}; session=null;
    Object.keys(imgCache).forEach(k=>delete imgCache[k]);
    await jset('kakomon:questions', questions); await jset('kakomon:progress', progress);
    flash($('#smsg'),'good','削除しました。');
    renderManage();
  }

  const pushedImgs=new Set(); // このセッションで送信済みの画像ID（再送抑止）

  function waitForFirebase(){

  function buildSyncBlob(){
    const customQ = questions.filter(q=>!bundledIds.has(q.id));

  function mergeProgress(a,b){
    const out={}; const ids=new Set([...Object.keys(a||{}),...Object.keys(b||{})]);
    for(const id of ids){
      const A=(a&&a[id]&&a[id].attempts)?a[id].attempts:[];
      const B=(b&&b[id]&&b[id].attempts)?b[id].attempts:[];
      const m=new Map(); [...A,...B].forEach(x=>{ if(x&&typeof x.t==='number') m.set(x.t,x); });
      const att=[...m.values()].sort((x,y)=>x.t-y.t);
      out[id]=Object.assign({attempts:att}, sched(att));
    }
    return out;
  }
  async function applyRemote(remote){
    if(!remote) return;
    progress = mergeProgress(progress, remote.progress);
    await jset('kakomon:progress', progress);
    if(remote.difficulty && typeof remote.difficulty==='object'){
      Object.assign(difficulty, remote.difficulty);
      await jset('kakomon:difficulty', difficulty);
    }
    if(Array.isArray(remote.customQuestions)){
      for(const rq of remote.customQuestions){
        if(!rq || !rq.id || bundledIds.has(rq.id)) continue;
        const idx=questions.findIndex(q=>q.id===rq.id);
        if(idx<0){ questions.push(rq); }
        else if((rq.updatedAt||0) >= (questions[idx].updatedAt||0)){ questions[idx]=rq; }
        if(remote.customImages && remote.customImages[rq.id]){
          imgCache[rq.id]=remote.customImages[rq.id];

  async function pullMergePush(){
    if(syncBusy || !fbUser) return; syncBusy=true;
    try{
      const snap=await syncRef().get();
      if(snap.exists){
        const remote=snap.data(); remote.customImages={};
        // 画像はローカルに無いものだけ images/{qid} から取得
        for(const rq of (remote.customQuestions||[])){
          if(rq && rq.id && rq.hasImage && !rq.id.includes('/') && !(await jget('kakomon:img:'+rq.id, null))){
            const im=await imgRef(rq.id).get();
            if(im.exists) remote.customImages[rq.id]=im.get('data');
          }
        }
        await applyRemote(remote);
      }
      const blob=buildSyncBlob(); const imgs=blob.customImages; delete blob.customImages;
      if(JSON.stringify(blob).length>900000){ console.warn('sync: blob too large, skipped'); setSyncStatus('error'); return; }
      await syncRef().set(blob);
      for(const id of Object.keys(imgs)){
        if(pushedImgs.has(id)) continue;
        if(id.includes('/') || imgs[id].length>900000){ console.warn('sync: image skipped:', id); continue; }
        await imgRef(id).set({data:imgs[id], updatedAt:Date.now()});

  }

  async function initSync(){

        let guarded=false; try{ guarded=sessionStorage.getItem('kakomon:autoAuth')==='1'; }catch(e){}

          catch(e){ console.error(e); setSyncStatus('reauth'); }

  function aiRef(id){ return firebase.firestore().doc('users/'+fbUser.uid+'/ai/'+id); }

  // ミニLaTeXレンダラ: \frac・^・_・\sqrt・\text・記号のサブセットをHTML化。
  // テキスト断片は全てescapeHTMLを通す（XSS安全）。未対応コマンドは名前をそのまま表示。
  const TEX_SYM={times:'×',cdot:'·',div:'÷',le:'≦',leq:'≦',ge:'≧',geq:'≧',neq:'≠',ne:'≠',approx:'≈',pm:'±',infty:'∞',alpha:'α',beta:'β',gamma:'γ',lambda:'λ',mu:'μ',sigma:'σ',pi:'π',theta:'θ',Delta:'Δ',rightarrow:'→',to:'→',dots:'…',cdots:'…',ldots:'…'};
  function texToHtml(src){
    let i=0;
    function group(){ // 直後の {…} または1コマンド/1文字
      if(src[i]==='{'){ i++; const h=seq('}'); i++; return h; }
      if(src[i]==='\\') return cmd();
      return escapeHTML(src[i++]||'');
    }
    function cmd(){ // src[i] は '\'
      i++;
      const m=/^[a-zA-Z]+/.exec(src.slice(i));
      if(!m){ const ch=src[i++]||''; if(ch===','||ch===';') return ' '; return escapeHTML(ch); } // \{ \} \% \$ など
      const name=m[0]; i+=name.length;
      if(name==='frac'){ const a=group(), b=group(); return '<span class="tex-fr"><span class="tex-fn">'+a+'</span><span class="tex-fd">'+b+'</span></span>'; }
      if(name==='sqrt'){ return '√<span class="tex-sq">'+group()+'</span>'; }
      if(name==='text'||name==='mathrm'||name==='textrm'||name==='operatorname') return group();
      if(name==='mathbf'||name==='textbf') return '<b>'+group()+'</b>';
      if(name==='left'||name==='right') return '';
      if(name==='quad'||name==='qquad') return '　';
      if(TEX_SYM[name]!==undefined) return TEX_SYM[name];
      return escapeHTML(name);
    }
    function seq(end){
      let h='';
      while(i<src.length && src[i]!==end){
        const c=src[i];
        if(c==='\\') h+=cmd();
        else if(c==='^'){ i++; h+='<sup>'+group()+'</sup>'; }
        else if(c==='_'){ i++; h+='<sub>'+group()+'</sub>'; }
        else if(c==='{'){ i++; h+=seq('}'); i++; }
        else { h+=escapeHTML(c); i++; }
      }
      return h;
    }
    return seq();
  }
  // AI応答の簡易Markdown描画。数式($$..$$/$..$)を先に描画して退避し、
  // 残りをescapeHTML後に太字・見出し・箇条書き・codeのみ変換（XSS安全）
  function mdLite(t){
    const math=[];
    t=String(t==null?'':t)
      .replace(/\$\$([\s\S]+?)\$\$/g,(_,x)=>{ math.push('<span class="math">'+texToHtml(x.trim())+'</span>'); return '\x01'+(math.length-1)+'\x01'; })
      .replace(/\$([^$\n]+?)\$/g,(_,x)=>{ math.push(texToHtml(x)); return '\x01'+(math.length-1)+'\x01'; });
    const inline=s=>s.replace(/`([^`]+)`/g,'<code>$1</code>').replace(/\*\*([^*]+)\*\*/g,'<b>$1</b>');
    const out=[]; let ul=false;
    for(const ln of escapeHTML(t).split('\n')){
      const li=ln.match(/^\s*[-*・]\s+(.*)/);
      if(li){ if(!ul){out.push('<ul>'); ul=true;} out.push('<li>'+inline(li[1])+'</li>'); continue; }
      if(ul){ out.push('</ul>'); ul=false; }
      const h=ln.match(/^\s*#{1,4}\s+(.*)/);
      if(h){ out.push('<h4>'+inline(h[1])+'</h4>'); continue; }
      if(ln.trim()===''){ out.push('<div style="height:5px"></div>'); continue; }
      out.push('<p>'+inline(ln)+'</p>');
    }
    if(ul) out.push('</ul>');
    return out.join('').replace(/\x01(\d+)\x01/g,(_,n)=>math[+n]);
  }
  // 問題コンテキスト（初回ターン）。画像付き問題は inline_data で画像も添付。
  async function aiContextParts(q, resultLabel){
    const t='【試験】情報処理安全確保支援士試験 午前I'+(q.exam?('（'+q.exam+'）'):'')+'\n【分類】'+(q.category||'—')
      +(q.calc?'\n【注意】これは計算問題です。必ず計算過程をステップバイステップで示してください。':'')
      +'\n【問題文】\n'+q.question
      +'\n【選択肢】\n'+q.choices.map((c,i)=>LETTERS[i]+'．'+c).join('\n')
      +'\n【正解】'+LETTERS[q.answer]
      +(q.explanation?('\n【手持ちの解説】\n'+q.explanation):'')
      +(resultLabel?('\n【受験者の回答】'+resultLabel):'')
      +'\n\nこの問題を解説してください。';
    const parts=[];
    if(q.hasImage){
      const d=await loadImage(q.id);
      const m=d&&d.match(/^data:(image\/[\w.+-]+);base64,(.+)$/s);
      if(m) parts.push({inline_data:{mime_type:m[1], data:m[2]}});
    }

  // ストリーミング呼び出し1回分（SSE）。onDelta にはその時点までの全文を渡す。
  async function aiCallOnce(model, contents, onDelta){
    const url='https://generativelanguage.googleapis.com/v1beta/models/'+model+':streamGenerateContent?alt=sse';
    const res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json','x-goog-api-key':aiKey},body:JSON.stringify({system_instruction:{parts:[{text:AI_SYS}]}, contents})});
    if(!res.ok){
      let detail=''; try{ const eo=JSON.parse(await res.text()); if(eo&&eo.error&&eo.error.message) detail='\n詳細: '+eo.error.message; }catch(e){}
      let msg='AIの呼び出しに失敗しました（HTTP '+res.status+'）。';
      if(res.status===429) msg='無料枠の上限に達した可能性があります。時間を置くか、問題管理タブでFlash-Liteに切り替えてください。';
      else if(res.status===404) msg='モデルが見つかりません（提供終了の可能性）。問題管理タブでモデルを切り替えてください。';
      else if(res.status===503||res.status===500||res.status===504) msg='モデルが混雑しています。時間を置いて再試行するか、問題管理タブでFlash-Liteに切り替えてください。';
      else if(res.status===400||res.status===401||res.status===403) msg='APIキーが無効の可能性があります。問題管理タブの設定を確認してください。';
      const err=new Error(msg+detail);
      err.retryable=(res.status===503||res.status===500||res.status===504); // 一時的な過負荷のみ再試行対象
      throw err;
    }
    const rd=res.body.getReader(); const dec=new TextDecoder(); let buf='', full='';
    while(true){
      const {done,value}=await rd.read(); if(done) break;
      buf+=dec.decode(value,{stream:true});
      const lines=buf.split('\n'); buf=lines.pop();
      for(const ln of lines){
        if(!ln.startsWith('data:')) continue;
        const js=ln.slice(5).trim(); if(!js) continue;
        try{
          const o=JSON.parse(js);
          const ps=(((o.candidates||[])[0]||{}).content||{}).parts;
          if(Array.isArray(ps)) ps.forEach(p=>{ if(p.text){ full+=p.text; onDelta(full); } });
        }catch(e){}
      }
    }
    if(!full) throw new Error('AIから応答がありませんでした。もう一度お試しください。');
    return full;
  }
  // 混雑(503等)時は数秒待って再試行し、それでもダメなら軽量なFlash-Liteへ自動フォールバック。
  // onStatus には再試行中のユーザー向け状況テキストを渡す。
  async function aiCall(contents, onDelta, onStatus){
    const lite='gemini-flash-lite-latest';
    const plan=[{m:aiModel,wait:0,note:''},{m:aiModel,wait:2500,note:'混雑のため数秒後に再試行します…'}];
    if(aiModel!==lite) plan.push({m:lite,wait:2500,note:'混雑が続くためFlash-Liteで再試行します…'});
    let lastErr=null;
    for(const st of plan){
      if(st.wait){ if(onStatus) onStatus(st.note); await new Promise(r=>setTimeout(r,st.wait)); }
      try{ return await aiCallOnce(st.m, contents, onDelta); }
      catch(e){ lastErr=e; if(!e.retryable) throw e; }
    }
    throw lastErr;
  }

    function addMsg(cls, html){ const m=el('div','ai-msg '+cls); m.innerHTML=html; log.appendChild(m); return m; }
    function renderAll(){ log.innerHTML=''; messages.forEach(m=>addMsg(m.role==='user'?'user':'model', m.role==='user'?escapeHTML(m.text):mdLite(m.text))); }
    function setBusy(b){ busy=b; [send,regen].concat(qBtns).forEach(x=>x.disabled=b); }
    async function run(userMsg){
      if(busy) return; setBusy(true);
      if(userMsg){ messages.push({role:'user',text:userMsg}); renderAll(); }
      const mm=addMsg('model ai-typing','…');
      try{
        const ctxTurn={role:'user', parts: await aiContextParts(q, resultLabel)};
        const hist=messages.slice(-24).map(m=>({role:m.role==='user'?'user':'model', parts:[{text:m.text}]}));
        const full=await aiCall([ctxTurn].concat(hist), t=>{ mm.innerHTML=mdLite(t); }, s=>{ mm.textContent=s; });
        messages.push({role:'model',text:full});
        renderAll();
        aiCacheSet(q.id, messages);
      }catch(e){ mm.className='ai-msg err'; mm.textContent=(e&&e.message)||String(e); }
      setBusy(false);
    }
    regen.addEventListener('click',()=>{ if(busy) return; messages=[]; renderAll(); run(null); });
    qBtns.forEach(b=>b.addEventListener('click',()=>run(b.textContent)));
    send.addEventListener('click',()=>{ const t=inp.value.trim(); if(t && !busy){ inp.value=''; run(t); } });
    inp.addEventListener('keydown',e=>{ if(e.key==='Enter'){ e.preventDefault(); send.click(); } });
    const cached=await aiCacheGet(q.id);
    if(cached){ messages=cached.messages; renderAll(); }
    else run(null);
    return panel;
  }

  // ---------- boot ----------
  (async function init(){
    updateProfileIcon();
    activeSection = await jget('kakomon:activeSection', '午前1');
    if(activeSection!=='午前1' && activeSection!=='午前2') activeSection='午前1';
    root.querySelectorAll('.sec-btn').forEach(b=>b.setAttribute('aria-selected', b.dataset.sec===activeSection));
    moveSecGlider();
    questions = await jget('kakomon:questions', []);
    progress = await jget('kakomon:progress', {});
    // 旧スキーマ(固定間隔)からの移行: 履歴から ivl/ef/due 等を再計算
    Object.values(progress).forEach(p=>{ if(p&&p.attempts) Object.assign(p, sched(p.attempts)); });
    difficulty = await jget('kakomon:difficulty', {});
    aiKey = await jget('kakomon:aiKey', '');
    aiModel = await jget('kakomon:aiModel', 'gemini-flash-latest');
    if(!AI_MODELS[aiModel]) aiModel='gemini-flash-latest'; // 旧固定ID保存値からの自動移行を含む
    // ensure shape
    questions.forEach(q=>{ if(q.hasImage===undefined) q.hasImage=false; if(q.calc===undefined) q.calc=isCalcQ(q.id, q); });

    // 標準問題を data/ から読み込み（IDを bundledIds に登録しつつ upsert で取り込む）
    try{
      const man = await fetch('./data/index.json').then(r=>r.json());
      for(const d of (man.datasets||[])){
        try{
          const dj = await fetch('./data/'+d.file).then(r=>r.json());
          const arr = Array.isArray(dj)?dj:(dj.questions||[]);
          arr.forEach(q=>{ if(q.id) bundledIds.add(q.id); });
          if(arr.length) await upsert(arr);
        }catch(e){ console.error('dataset load failed', d.file, e); }
      }
    }catch(e){ console.error('manifest load failed', e); }

    show('home');

    // クラウド同期（ログイン済みなら自動で読み込み→マージ）。
    // SDK読込待ちでSW登録を遅らせないよう await しない
    initSync().catch(e=>console.error(e));

    // PWA: Service Worker 登録
    if('serviceWorker' in navigator){ try{ navigator.serviceWorker.register('./sw.js'); }catch(e){} }
  })();
})();
</script>
